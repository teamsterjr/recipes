 apiVersion: networking.k8s.io/v1beta1 
 kind: Ingress
 metadata:
   name: example-ingress
   annotations:
     nginx.ingress.kubernetes.io/rewrite-target: /$1
 spec:
   rules:
   - host: example.info
     http:
       paths:
       - path: /
         backend:
           serviceName: fe-service
           servicePort: 5000
